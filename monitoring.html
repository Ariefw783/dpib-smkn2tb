<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORING PC | DPIB DIGITAL DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent-yellow: #facc15;
            --accent-blue: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg-deep);
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .log-font { font-family: 'JetBrains Mono', monospace; }

        .glass-card-main {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .data-item {
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        .data-item:hover { background: rgba(255, 255, 255, 0.05); }

        .caution-bar {
            background: repeating-linear-gradient(45deg, #000, #000 10px, var(--accent-yellow) 10px, var(--accent-yellow) 20px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 10px currentColor;
        }

        .cursor-log::after {
            content: '_';
            animation: blink-cursor 0.8s infinite;
            color: var(--accent-yellow);
        }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }

        input, select {
            background-color: #0f172a !important;
            border: 1px solid var(--border) !important;
            color: white !important;
        }

        /* PRINT STYLES */
        @media print {
            @page { size: A4; margin: 1.5cm; }
            body { background: white !important; overflow: visible !important; height: auto !important; color: black !important; }
            header, footer, .no-print, button, #system-log-container, .main-filters { display: none !important; }
            #recent-list { width: 100% !important; overflow: visible !important; }
            .data-item { page-break-inside: avoid; border-bottom: 1px solid #ddd !important; background: white !important; }
            .data-item div { color: black !important; border-color: #eee !important; }
            .data-item h4 { color: black !important; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- --- GLOBAL MODAL (Themed) --- -->
    <div id="global-modal" class="hidden fixed inset-0 z-[200] items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-box" class="bg-slate-900 w-full max-w-sm rounded-3xl shadow-2xl relative z-10 p-8 border border-white/10">
            <div id="modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"></div>
            <div class="text-center mb-8">
                <h3 id="modal-title" class="font-black text-white uppercase text-lg mb-2"></h3>
                <p id="modal-desc" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest"></p>
            </div>
            <div id="modal-action" class="space-y-3"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50 no-print flex-shrink-0">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logosmk.png" onerror="this.src='https://via.placeholder.com/50?text=SMK'" alt="Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-xl font-bold tracking-tighter uppercase leading-none">DPIB DIGITAL DASHBOARD</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Monitoring Lab Komputer</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-6 text-right">
                <div class="font-mono text-sm">
                    <div id="clock-wib" class="text-white font-bold">00:00:00</div>
                    <div id="clock-firebase" class="text-gray-500 text-[10px] uppercase">...</div>
                </div>
                <div class="h-8 w-px bg-white/10"></div>
                <div class="flex items-center gap-2">
                    <span class="status-dot text-orange-500 bg-orange-500"></span>
                    <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Live Sync</span>
                </div>
            </div>
        </div>
    </header>

    <!-- --- MAIN CONTENT --- -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- HEADER CETAK -->
        <div class="print-only text-center border-b-2 border-slate-900 pb-4 mb-6">
            <h1 class="text-xl font-black uppercase">LAPORAN MONITORING PEMAKAIAN PC LAB DPIB</h1>
            <p class="text-xs font-bold uppercase tracking-widest">SMKN 2 TERBANGGI BESAR</p>
            <p id="print-filter-info" class="text-[10px] mt-1 font-mono uppercase"></p>
        </div>

        <div class="flex-shrink-0 glass-card-main z-10 no-print">
            <div class="p-4 md:p-6 flex flex-col gap-4 max-w-6xl mx-auto w-full">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left">
                        <div class="flex items-center gap-2 mb-1 justify-center md:justify-start">
                            <h3 class="font-black text-white text-lg md:text-2xl uppercase tracking-tighter">MONITORING PC AKTIF</h3>
                            <span class="bg-blue-500 text-white text-[9px] font-black px-2 py-0.5 rounded tracking-widest uppercase">Realtime</span>
                        </div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">
                            SESI: <span id="today-date" class="text-accent-yellow">--</span>
                        </p>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <!-- Main UI Filter -->
                        <div class="flex items-center gap-2 main-filters">
                             <select id="main-data-filter" class="bg-white/5 border border-white/10 text-white px-3 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest outline-none">
                                <option value="today">Hari Ini</option>
                                <option value="all">Semua Data</option>
                                <option value="pick">Pilih Tanggal</option>
                             </select>
                             <input type="date" id="main-date-picker" class="hidden bg-white/5 border border-white/10 text-white px-3 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest outline-none">
                        </div>

                        <div class="flex items-center gap-3 bg-white/5 p-1 pr-5 rounded-2xl border border-white/10">
                            <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center font-black text-lg shadow-lg" id="today-count">0</div>
                            <span class="text-[10px] font-bold uppercase tracking-widest leading-tight text-blue-400">PC Terdeteksi<br>Sesi Ini</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-wrap items-center justify-center md:justify-start gap-4 pt-2">
                    <button onclick="goHome()" class="bg-white/5 border border-white/10 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-white/10 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-house text-accent-yellow"></i> HOME
                    </button>
                    <button onclick="openInputManual()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:brightness-125 transition-all shadow-lg flex items-center gap-2">
                        + Input Data
                    </button>
                    <button onclick="openExportMenu()" class="bg-white/5 border border-white/10 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-white/10 transition-all shadow-lg flex items-center gap-2">
                        <i class="fa-solid fa-print"></i> Cetak / Export
                    </button>
                </div>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll pb-24">
            <div id="recent-list" class="max-w-6xl mx-auto w-full min-h-full">
                <div class="p-24 text-center">
                    <div class="animate-spin inline-block w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- System Log & Footer -->
    <div class="flex-shrink-0 z-50 no-print" id="system-log-container">
        <div class="w-full bg-slate-950/80 backdrop-blur-md p-2 md:px-6 border-t border-white/5">
            <div class="max-w-6xl mx-auto flex items-start gap-3">
                <span class="text-[7px] font-bold text-gray-600 uppercase tracking-tighter mt-0.5 flex-shrink-0">SYS_LOG:</span>
                <div id="system-log" class="log-font text-[8px] md:text-[9px] text-blue-400 leading-tight cursor-log min-h-[1.2em]"></div>
            </div>
        </div>

        <footer>
            <div class="caution-bar h-1 w-full"></div>
            <div class="bg-slate-950 py-8 px-6 text-center">
                <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <p class="text-[9px] font-bold text-gray-600 uppercase tracking-[0.4em]">© 2026 MONITORING ECOSYSTEM</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-yellow-400 rounded-full animate-ping"></div>
                        <span class="text-[8px] font-bold text-blue-500 uppercase tracking-widest">
                            PRODI DPIB SMKN 2 TERBANGGI BESAR
                        </span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- LOGIKA NAVIGATION & BACK BUTTON -->
    <script>
        function goHome() {
            window.location.href = 'index.html';
        }

        // Handle Mobile Back Button
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            if (!document.getElementById('global-modal').classList.contains('hidden')) {
                closeModal();
                window.history.pushState(null, null, window.location.href);
            } else {
                goHome();
            }
        };

        document.addEventListener('keydown', function(e) {
            const activeEl = document.activeElement;
            const isInput = activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT';
            const modalOpen = !document.getElementById('global-modal').classList.contains('hidden');

            if (e.key === "Backspace") {
                if (!isInput || (isInput && activeEl.value === "")) {
                    if (modalOpen) {
                        closeModal();
                    } else {
                        goHome();
                    }
                    e.preventDefault();
                }
            }

            if (e.key === "Escape") {
                if (modalOpen) closeModal();
            }

            if (e.key === "Enter") {
                if (modalOpen) {
                    const primaryBtn = document.querySelector('#modal-action button');
                    if (primaryBtn) primaryBtn.click();
                }
            }
        });
    </script>

    <!-- FIREBASE & LOGIKA UTAMA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD5hD7ioYoM0RTaHE_W9Vju6-FsrhtPK-s",
            authDomain: "pemakaian-alat.firebaseapp.com",
            projectId: "pemakaian-alat",
            storageBucket: "pemakaian-alat.firebasestorage.app",
            messagingSenderId: "601849837322",
            appId: "1:601849837322:web:5d16d64b6bef2abedf2cf3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let logQueue = [];
        let isTyping = false;
        let currentUnsubscribe = null;

        const formatWIB = (dataDoc) => {
            let date;
            if (dataDoc.Waktu_Masuk) {
                date = new Date(dataDoc.Waktu_Masuk);
            } else if (dataDoc.server_sync) {
                date = dataDoc.server_sync.toDate ? dataDoc.server_sync.toDate() : new Date(dataDoc.server_sync);
            } else {
                return "--:--:--";
            }
            // KOREKSI: Kurangi 7 Jam dari waktu server
            date.setHours(date.getHours() - 7);
            return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        };

        window.pushLog = (msg) => {
            logQueue.push(`> ${msg} | `);
            if (!isTyping) processLog();
        };

        async function processLog() {
            if (logQueue.length === 0) {
                const idleMsgs = ["DB_IDLE", "LISTENING_REALTIME", "SYNC_ACTIVE"];
                logQueue.push(`> ${idleMsgs[Math.floor(Math.random()*idleMsgs.length)]} | `);
            }
            isTyping = true;
            const logEl = document.getElementById('system-log');
            const fullMsg = logQueue.shift();
            if (logEl.innerText.length > 150) logEl.innerText = ""; 
            for (let i = 0; i < fullMsg.length; i++) {
                logEl.innerText += fullMsg.charAt(i);
                await new Promise(r => setTimeout(r, 45));
            }
            isTyping = false;
            setTimeout(processLog, 1200);
        }

        window.showModal = function({type, title, desc, actionHtml}) {
            const modal = document.getElementById('global-modal');
            const icon = document.getElementById('modal-icon');
            const styles = { 
                success: 'bg-green-500/10 text-green-500 border border-green-500/20', 
                error: 'bg-red-500/10 text-red-500 border border-red-500/20', 
                info: 'bg-blue-500/10 text-blue-500 border border-blue-500/20' 
            };
            const svgs = {
                success: `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`,
                error: `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>`,
                info: `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
            };
            icon.className = `w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 ${styles[type]}`;
            icon.innerHTML = svgs[type];
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-action').innerHTML = actionHtml || `<button onclick="closeModal()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Tutup Dialog</button>`;
            modal.classList.replace('hidden','flex');
            window.pushLog(`MODAL_DISPLAY: ${title}`);
        };

        window.closeModal = () => document.getElementById('global-modal').classList.replace('flex','hidden');

        window.openInputManual = () => {
            window.showModal({
                type: 'info', title: 'Admin Auth', desc: 'Sandi diperlukan untuk menulis data.',
                actionHtml: `<input id="m-pass" type="password" placeholder="PASSWORD" class="w-full bg-black/50 p-4 rounded-xl text-center font-black outline-none border border-white/10 mb-2 tracking-widest">
                             <button onclick="authManual()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Verifikasi</button>`
            });
            setTimeout(() => document.getElementById('m-pass').focus(), 150);
        };

        window.authManual = () => {
            if(document.getElementById('m-pass').value === "admin12315.30") {
                closeModal();
                showForm();
            } else { 
                window.showModal({type:'error', title:'Akses Ditolak', desc:'Sandi autentikasi salah.'}); 
            }
        };

        window.showForm = () => {
            window.showModal({
                type: 'info', title: 'Input Manual', desc: 'Catat pemakaian PC secara manual.',
                actionHtml: `
                    <div class="space-y-3 text-left">
                        <input id="f-nama" type="text" placeholder="NAMA LENGKAP" class="w-full bg-black p-4 rounded-lg text-[11px] font-bold border border-white/10 uppercase">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="f-pc" type="text" placeholder="NOMOR PC" class="bg-black p-4 rounded-lg text-[11px] font-bold border border-white/10 uppercase">
                            <select id="f-kelas" class="bg-black p-4 rounded-lg text-[11px] font-bold border border-white/10"><option value="X">X</option><option value="XI">XI</option><option value="XII">XII</option></select>
                        </div>
                        <select id="f-jurusan" class="w-full bg-black p-4 rounded-lg text-[11px] font-bold border border-white/10"><option value="DPIB 1">DPIB 1</option><option value="DPIB 2">DPIB 2</option></select>
                        <input id="f-guru" type="text" placeholder="GURU PENGAJAR" class="w-full bg-black p-4 rounded-lg text-[11px] font-bold border border-white/10 uppercase">
                        <button onclick="submitData()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase mt-2 tracking-widest">Simpan Data</button>
                    </div>`
            });
        };

        window.submitData = async () => {
            const nama = document.getElementById('f-nama').value.toUpperCase();
            const pc = document.getElementById('f-pc').value;
            if(!nama || !pc) return;

            const data = { 
                Nama: nama, Nomor_Komputer: pc, Kelas: document.getElementById('f-kelas').value, 
                Jurusan: document.getElementById('f-jurusan').value, 
                Nama_Guru_Petugas: document.getElementById('f-guru').value.toUpperCase() || "-", 
                Waktu_Masuk: new Date().toISOString(), Metode_Sync: "Manual_Admin" 
            };

            try { 
                await addDoc(collection(db, "log_akses_lab"), { ...data, server_sync: serverTimestamp() }); 
                window.pushLog(`SYNC_OK: ${data.Nama}`); 
                window.showModal({type:'success', title:'Berhasil', desc:'Data telah disinkronisasi ke cloud.'}); 
            } catch(e) { window.showModal({type:'error', title:'Gagal', desc: e.message}); }
        };

        // KOREKSI: Fungsi Cetak Baru (Tanpa Password & Mengikuti Filter Aktif)
        window.openExportMenu = () => {
            const filterType = document.getElementById('main-data-filter').value;
            const count = document.getElementById('today-count').innerText;
            const dateVal = document.getElementById('main-date-picker').value;
            
            let filterText = filterType === 'today' ? "HARI INI" : (filterType === 'all' ? "SEMUA RIWAYAT" : `TANGGAL: ${dateVal}`);
            document.getElementById('print-filter-info').innerText = `FILTER: ${filterText} | TOTAL: ${count} UNIT PC TERDETEKSI`;
            
            window.pushLog("PRINT_MODE_ACTIVE");
            window.print();
        };

        const loadData = (filterType = 'today', filterDate = '') => {
            if (currentUnsubscribe) currentUnsubscribe();
            
            const list = document.getElementById('recent-list');
            list.innerHTML = '<div class="p-24 text-center"><div class="animate-spin inline-block w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full"></div></div>';

            let q;
            if (filterType === 'today') {
                const nowJKT = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
                nowJKT.setHours(0,0,0,0);
                q = query(collection(db, "log_akses_lab"), where("Waktu_Masuk", ">=", nowJKT.toISOString()), orderBy("Waktu_Masuk", "desc"));
            } else if (filterType === 'pick' && filterDate) {
                const start = `${filterDate}T00:00:00.000Z`;
                const end = `${filterDate}T23:59:59.999Z`;
                q = query(collection(db, "log_akses_lab"), where("Waktu_Masuk", ">=", start), where("Waktu_Masuk", "<=", end), orderBy("Waktu_Masuk", "desc"));
            } else {
                q = query(collection(db, "log_akses_lab"), orderBy("Waktu_Masuk", "desc"));
            }

            currentUnsubscribe = onSnapshot(q, (snap) => {
                list.innerHTML = ''; 
                let rawData = [];
                snap.forEach(doc => rawData.push(doc.data()));

                const uniquePCData = Array.from(new Map(rawData.map(item => [item.Nomor_Komputer, item])).values());
                uniquePCData.sort((a, b) => a.Nomor_Komputer.localeCompare(b.Nomor_Komputer, undefined, {numeric: true}));

                document.getElementById('today-count').innerText = uniquePCData.length;
                
                if(uniquePCData.length === 0) {
                    list.innerHTML = `<div class="p-20 text-center text-[10px] font-black text-gray-600 uppercase tracking-widest">Belum ada aktivitas di periode ini.</div>`;
                    return;
                }

                uniquePCData.forEach(d => {
                    const div = document.createElement('div');
                    div.className = "data-item grid grid-cols-[80px_1fr_110px] md:grid-cols-[100px_1fr_140px] items-center p-4 md:px-8 gap-4 md:gap-6";
                    div.innerHTML = `
                        <div class="w-full h-12 md:h-14 bg-white/5 text-white rounded-2xl flex items-center justify-center font-black border border-white/10 flex-shrink-0 text-[10px] md:text-xs tracking-tighter">
                            PC ${d.Nomor_Komputer}
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-[12px] md:text-[13px] font-black text-white uppercase truncate">${d.Nama}</h4>
                            <div class="text-[9px] md:text-[10px] font-bold text-gray-500 uppercase tracking-widest truncate mt-1">
                                ${d.Kelas} ${d.Jurusan} • <span class="text-blue-500">${d.Nama_Guru_Petugas}</span>
                            </div>
                        </div>
                        <div class="text-right border-l border-white/5 pl-4">
                            <span class="block text-[14px] md:text-[16px] font-black text-white log-font leading-none">${formatWIB(d)}</span>
                            <span class="text-[8px] font-black text-accent-yellow uppercase tracking-tighter mt-1 block">Live Recorded</span>
                        </div>`;
                    list.appendChild(div);
                });
                
                window.pushLog(`SYNC: ${uniquePCData.length} records active.`);
            }, (error) => { window.pushLog(`ERR: ${error.message}`); });
        };

        const startApp = () => {
            const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
            const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
            
            setInterval(() => {
                const now = new Date();
                if(document.getElementById('clock-wib')) document.getElementById('clock-wib').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                if(document.getElementById('clock-firebase')) document.getElementById('clock-firebase').innerText = now.toISOString().split('T')[1].split('.')[0] + " UTC";
                if(document.getElementById('today-date')) document.getElementById('today-date').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`.toUpperCase();
            }, 1000);

            window.pushLog("SYSTEM_INIT: DPIB DASHBOARD READY.");
            
            const filterSelect = document.getElementById('main-data-filter');
            const datePicker = document.getElementById('main-date-picker');

            filterSelect.onchange = (e) => {
                if (e.target.value === 'pick') {
                    datePicker.classList.remove('hidden');
                } else {
                    datePicker.classList.add('hidden');
                    loadData(e.target.value);
                }
            };

            datePicker.onchange = (e) => {
                loadData('pick', e.target.value);
            };

            loadData('today');
        };

        startApp();
        processLog(); 
    </script>
</body>
</html>
